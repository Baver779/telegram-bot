name: Telegram Bot 7/24
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir botu otomatik yeniden başlatır
  workflow_dispatch: # Manuel başlatma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yukle
        run: |
          pip install python-telegram-bot requests

      - name: Botu Calistir
        run: python main.py
        
